<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Cobre vs Fibra - Wesly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        .canvas {
            width: 1080px;
            height: 1350px;
            display: flex;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* Divisão de Background */
        .side {
            flex: 1;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .left {
            background: radial-gradient(circle at center, #2b1800 0%, #0a0500 100%);
            border-right: 1px solid rgba(255, 100, 0, 0.2);
        }

        .right {
            background: radial-gradient(circle at center, #001a1a 0%, #050505 100%);
        }

        /* Efeitos Lado Esquerdo (Cobre) */
        .copper-wire {
            width: 40px;
            height: 600px;
            background: linear-gradient(90deg, #8b4513, #cd7f32, #8b4513);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 0 30px rgba(205, 127, 50, 0.3);
        }

        .interference {
            position: absolute;
            width: 180%;
            height: 120%;
            border: 2px dashed rgba(255, 165, 0, 0.2);
            border-radius: 50%;
            animation: shake 0.3s infinite linear;
            top: -10%;
            left: -40%;
        }

        @keyframes shake {
            0% { transform: translate(0,0) rotate(0deg); opacity: 0.5; }
            33% { transform: translate(10px, 5px) rotate(5deg); opacity: 0.2; }
            66% { transform: translate(-10px, -5px) rotate(-5deg); opacity: 0.5; }
            100% { transform: translate(0,0) rotate(0deg); opacity: 0.5; }
        }

        /* Efeitos Lado Direito (Fibra) */
        .fiber-optic {
            width: 15px;
            height: 700px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        .light-beam {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background: #00FFFF;
            box-shadow: 0 0 20px #00FFFF, 0 0 40px #00FFFF;
            animation: pulse-light 2s infinite ease-in-out;
        }

        @keyframes pulse-light {
            0%, 100% { opacity: 0.8; height: 100%; }
            50% { opacity: 1; height: 105%; }
        }

        .flare {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #fff 0%, #00FFFF 70%, transparent 100%);
            filter: blur(5px);
        }

        /* Typography */
        .label {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 15px;
            margin-top: 50px;
            text-transform: uppercase;
        }

        .left .label { color: #cd7f32; text-shadow: 0 0 10px rgba(205, 127, 50, 0.5); }
        .right .label { color: #00FFFF; text-shadow: 0 0 20px #00FFFF; }

        .vs-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: #000;
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            font-size: 48px;
            font-weight: 900;
            font-style: italic;
            color: #fff;
        }

        /* Branding Wesly */
        .footer-branding {
            position: absolute;
            bottom: 80px;
            width: 100%;
            text-align: center;
            z-index: 200;
        }

        .wesly-name {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 12px;
            color: #fff;
            text-transform: uppercase;
            background: rgba(0,0,0,0.8);
            padding: 15px 40px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.2);
            display: inline-block;
        }
        
        .wesly-name span { color: #00FFFF; }

    </style>
</head>
<body>

    <div class="canvas">
        <div class="vs-circle">VS</div>

        <div class="side left">
            <div class="copper-wire">
                <div class="interference"></div>
                <div class="interference" style="animation-delay: 0.1s; width: 140%; left: -20%;"></div>
            </div>
            <div class="label">Instável</div>
        </div>

        <div class="side right">
            <div class="fiber-optic">
                <div class="light-beam"></div>
                <div class="flare"></div>
            </div>
            <div class="label">Estável</div>
        </div>

        <div class="footer-branding">
            <div class="wesly-name">WESLY <span>| INSIGHTS TECH</span></div>
        </div>
    </div>

</body>
</html>
