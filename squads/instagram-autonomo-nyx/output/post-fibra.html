<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Fibra Óptica - Wesly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }

        /* Container Principal (Proporção 1080x1350) */
        .canvas {
            width: 1080px;
            height: 1350px;
            background: #050505;
            position: relative;
            overflow: hidden;
            color: #fff;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ambient Background Glows */
        .glow-purple {
            position: absolute;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #A020F0 0%, transparent 70%);
            opacity: 0.3;
            filter: blur(80px);
        }

        .glow-cyan {
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #00FFFF 0%, transparent 70%);
            opacity: 0.2;
            filter: blur(80px);
        }

        /* Grid de Fundo */
        .grid {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Representação Simbólica das Fibras */
        .fiber-bundle {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fiber {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00FFFF, transparent);
            box-shadow: 0 0 10px #00FFFF;
            opacity: 0.5;
            border-radius: 100%;
        }

        .f1 { width: 120%; transform: rotate(15deg); top: 30%; }
        .f2 { width: 120%; transform: rotate(-25deg); bottom: 20%; background: #A020F0; box-shadow: 0 0 10px #A020F0; }
        .f3 { width: 120%; transform: rotate(160deg); top: 50%; opacity: 0.3; }

        /* Título Central Glassmorphism */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 60px 80px;
            border-radius: 40px;
            text-align: center;
            z-index: 10;
            max-width: 850px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(0,255,255,0.5), transparent, rgba(160,32,240,0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        h2 {
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #00FFFF;
            margin-bottom: 20px;
            font-weight: 400;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            position: absolute;
            bottom: 60px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.4);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
            width: 80%;
            text-align: center;
        }

    </style>
</head>
<body>

    <div class="canvas">
        <div class="grid"></div>
        <div class="glow-purple"></div>
        <div class="glow-cyan"></div>

        <div class="fiber-bundle">
            <div class="fiber f1"></div>
            <div class="fiber f2"></div>
            <div class="fiber f3"></div>
        </div>

        <div class="card">
            <h2>Tecnologia Wesly</h2>
            <h1>FIBRA ÓPTICA: O FUTURO EM ALTA VELOCIDADE</h1>
        </div>

        <div class="badge">CONECTIVIDADE E INFRAESTRUTURA 2026</div>
    </div>

</body>
</html>
